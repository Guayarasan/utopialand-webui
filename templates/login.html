<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión · Utopialand WebUI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="auth-brand-icon">🌍</span>
            <div>
                <strong>Utopialand</strong>
                <div class="sidebar-brand-sub">Tianyan WebUI</div>
            </div>
        </div>

        <h1 class="auth-title">Iniciar sesión</h1>
        <p class="auth-subtitle">Accede con tu cuenta para consultar los registros del servidor.</p>

        {% if error %}
        <div class="conn-result show error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.login_submit') }}" class="auth-form">
            <input type="hidden" name="next" value="{{ next_url }}">
            <div class="field">
                <label for="username">Usuario</label>
                <input id="username" name="username" type="text" autocomplete="username" required autofocus value="{{ prefill_username or '' }}">
            </div>
            <div class="field">
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary auth-submit">Entrar</button>
        </form>
    </div>
</div>
</body>
</html>
